global:
  paths:
    inputs_dir: ./inputs
    outputs_dir: ./outputs
    questions_file: ./test_questions.json
  # OpenRouter endpoint + key come from these environment variables (.env).
  endpoint_env: OPENROUTER_ENDPOINT
  api_key_env: OPENROUTER_API_KEY
  # Seed for randomizing aggregated question order (reproducible). Remove for random.
  seed: 42
  # Parallel worker threads for `run` (questions answered + judged concurrently). 1 = serial.
  workers: 4
  defaults:
    llm_model: openai/gpt-4o-mini
    embedding_model: openai/text-embedding-3-small
  # Optional per-model pricing (USD per 1M tokens) for cost estimation.
  pricing:
    openai/gpt-4o-mini:
      input: 0.15
      output: 0.60
    # Embedding models: cost is per-input-token (output unused).
    openai/text-embedding-3-small:
      input: 0.02
      output: 0.0
  judge:
    model: google/gemini-2.5-flash
    temperature: 0.0

systems:
  simple-rag:
    enabled: true
    llm_model: openai/gpt-4o-mini
    embedding_model: openai/text-embedding-3-small
    chunk_size: 400
    chunk_overlap: 150
    top_k: 15
    temperature: 0.0
    tuning:                        # `tune -s simple-rag` grid-searches these
      index_params: [chunk_size, chunk_overlap]   # changing these re-indexes; others reuse the index
      grid: # best combination found so far chunk_size=400, chunk_overlap=150, top_k=15
        chunk_size: [300, 400, 500]
        chunk_overlap: [200, 150, 100]
        top_k: [15]
  simple-rag-reranker:
    enabled: true
    llm_model: openai/gpt-4o-mini
    embedding_model: openai/text-embedding-3-small   # MUST match simple-rag (shared vector space)
    source_system: simple-rag   # reuses this system's Chroma index (no own indexing)
    retrieve_k: 40              # candidates fetched from the shared index before reranking
    top_k: 12                   # kept after Cohere rerank (matches simple-rag's context size)
    rerank_model: rerank-v3.5   # Cohere rerank model (uses COHERE_API_KEY from env)
    temperature: 0.0
    tuning:                        # `tune -s simple-rag-reranker` grid-searches these
      index_params: []             # both are query-only (reranker reuses simple-rag's index)
      grid:                        # keep top_k <= retrieve_k
        retrieve_k: [40]           # Best option so far retrieve_k=40, top_k=12
        top_k: [12]
  hybrid-rag:
    enabled: true
    llm_model: openai/gpt-4o-mini
    embedding_model: openai/text-embedding-3-small
    chunk_size: 400        # matches simple-rag for fair comparison (notebook used 400)
    chunk_overlap: 150
    top_k: 15
    bm25_weight: 0.333      # lexical weight (normalized; only the bm25:dense ratio matters)
    dense_weight: 0.667     # dense weight (normalized to sum to 1 with bm25_weight)
    temperature: 0.0
    tuning:                        # `tune -s hybrid-rag` grid-searches these
      index_params: []             # top_k & bm25_weight are query-only (index built once)
      normalize: [bm25_weight, dense_weight]   # winner written back normalized to sum to 1
      grid:                        # only the bm25:dense ratio matters (dense_weight fixed above)
        top_k: [8, 12, 15]
        bm25_weight: [0.3, 0.5, 0.7]
        # To also tune chunking, add chunk_size/chunk_overlap here AND to index_params.
  hybrid-rag-reranker:
    enabled: true
    llm_model: openai/gpt-4o-mini
    embedding_model: openai/text-embedding-3-small   # MUST match hybrid-rag (shared vector space)
    source_system: hybrid-rag   # reuses this system's Chroma index (no own indexing)
    retrieve_k: 40              # candidates per base retriever before fusion + reranking
    top_k: 12                   # kept after Cohere rerank
    bm25_weight: 0.333          # ensemble fusion weights (match hybrid-rag)
    dense_weight: 0.667
    rerank_model: rerank-v3.5   # Cohere rerank model (uses COHERE_API_KEY from env)
    temperature: 0.0
  graph-rag:
    enabled: true
    llm_model: openai/gpt-4o-mini
    embedding_model: openai/text-embedding-3-small
    # Local Neo4j (docker; see scripts/neo4j.sh). Distinct from any cloud NEO4J_URI.
    neo4j_uri: bolt://localhost:7687
    neo4j_username: neo4j
    neo4j_password_env: NEO4J_LOCAL_PASSWORD   # default 'hola1234' if unset (matches scripts/neo4j.sh)
    # Larger chunks than the vector systems: graph extraction is one LLM call per
    # chunk (slow), and benefits from more context per call.
    chunk_size: 3000
    chunk_overlap: 300
    seed_k: 8               # seed entities from vector search over the question
    max_triples: 60         # relationship triples included in context
    max_passages: 6         # source passages (mentioning seed entities) included
    temperature: 0.0
  llm-wiki:
    enabled: true
    llm_model: openai/gpt-4o-mini   # no embeddings used (pure form, no vector DB)
    chunk_size: 3000        # larger chunks -> fewer extraction calls
    chunk_overlap: 300
    route_max_pages: 8      # max pages the router may pick from index.md
    link_hops: 1            # expand selected pages via [[wikilinks]] (0 = index-only)
    temperature: 0.0
